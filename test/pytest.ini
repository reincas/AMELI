[pytest]
addopts = --html=ameli_test.html --self-contained-html

# Log file configuration
log_file = ameli_test.log
log_file_level = DEBUG
log_file_format = %(asctime)s - %(levelname)s - %(test_context)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Live console output
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s - %(levelname)s - %(test_context)s - %(message)s
